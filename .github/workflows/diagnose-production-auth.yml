name: Diagnose production authentication

on:
  push:
    branches:
      - diag/production-auth-request
    paths:
      - .github/workflows/diagnose-production-auth.yml

permissions:
  contents: read
  statuses: write

jobs:
  probe:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Probe custom and Netlify production origins
        id: probe
        continue-on-error: true
        shell: bash
        run: |
          set -u
          : > production-auth-probe.txt
          failed=0
          for target in https://accessrevamp.com https://www.accessrevamp.com https://accessrevamp.netlify.app; do
            echo "TARGET $target" | tee -a production-auth-probe.txt

            account_body=$(mktemp)
            account_status=$(curl --http1.1 -sS --retry 2 --retry-all-errors --connect-timeout 10 --max-time 30 \
              -o "$account_body" -w '%{http_code}' \
              -H "Origin: $target" -H 'Cache-Control: no-cache' \
              "$target/api/account-projects" || echo 000)
            echo "account_status=$account_status" | tee -a production-auth-probe.txt
            head -c 500 "$account_body" | tee -a production-auth-probe.txt || true
            echo | tee -a production-auth-probe.txt

            login_body=$(mktemp)
            login_status=$(curl --http1.1 -sS --retry 2 --retry-all-errors --connect-timeout 10 --max-time 30 \
              -o "$login_body" -w '%{http_code}' \
              -X POST -H "Origin: $target" -H 'Content-Type: application/json' -H 'Cache-Control: no-cache' \
              --data "{\"email\":\"auth-probe-${RANDOM}-${RANDOM}@example.invalid\",\"password\":\"DeliberatelyWrong!234\"}" \
              "$target/api/auth-login-start" || echo 000)
            echo "login_status=$login_status" | tee -a production-auth-probe.txt
            head -c 500 "$login_body" | tee -a production-auth-probe.txt || true
            echo | tee -a production-auth-probe.txt

            if [ "$account_status" != "401" ]; then failed=1; fi
            if [ "$login_status" != "401" ] && [ "$login_status" != "429" ]; then failed=1; fi
            rm -f "$account_body" "$login_body"
          done
          exit "$failed"
      - name: Upload probe output
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: production-auth-probe
          path: production-auth-probe.txt
          retention-days: 1
      - name: Publish diagnostic status
        if: always()
        env:
          GITHUB_TOKEN: ${{ github.token }}
          PROBE_OUTCOME: ${{ steps.probe.outcome }}
          TARGET_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          node <<'NODE'
          const passed = process.env.PROBE_OUTCOME === 'success';
          const response = await fetch(`https://api.github.com/repos/${process.env.GITHUB_REPOSITORY}/statuses/${process.env.GITHUB_SHA}`, {
            method: 'POST',
            headers: {
              accept: 'application/vnd.github+json',
              authorization: `Bearer ${process.env.GITHUB_TOKEN}`,
              'content-type': 'application/json',
              'x-github-api-version': '2022-11-28',
            },
            body: JSON.stringify({
              state: passed ? 'success' : 'failure',
              context: 'accessrevamp/production-auth-probe',
              description: passed ? 'Production auth endpoints are configured' : 'Production auth endpoints are failing',
              target_url: process.env.TARGET_URL,
            }),
          });
          if (!response.ok) throw new Error(`Status API returned ${response.status}`);
          if (!passed) process.exitCode = 1;
          NODE
