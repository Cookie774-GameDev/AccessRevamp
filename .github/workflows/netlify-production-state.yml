name: Inspect Netlify production state

on:
  push:
    branches: [diag/netlify-production-state]
    paths:
      - .github/workflows/netlify-production-state.yml

permissions:
  contents: read
  statuses: write

jobs:
  inspect:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Inspect public production and Netlify API
        id: inspect
        continue-on-error: true
        env:
          GITHUB_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -o pipefail
          node <<'NODE' 2>&1 | tee netlify-production-state.txt
          const siteName = 'accessrevamp.netlify.app';
          const repository = 'Cookie774-GameDev/AccessRevamp';
          const githubHeaders = {
            accept: 'application/vnd.github+json',
            authorization: `Bearer ${process.env.GITHUB_TOKEN}`,
            'x-github-api-version': '2022-11-28',
          };
          const site = await fetch(`https://api.netlify.com/api/v1/sites/${siteName}`).then((response) => response.json());
          const deploys = await fetch(`https://api.netlify.com/api/v1/sites/${siteName}/deploys?per_page=50`).then((response) => response.json());
          const markerResponse = await fetch('https://accessrevamp.com/accessrevamp-deploy-version.txt', { redirect: 'manual' });
          const markerText = await markerResponse.text();
          const production = deploys
            .filter((deploy) => deploy.context === 'production' || deploy.branch === 'main')
            .map((deploy) => ({
              id: deploy.id,
              build_id: deploy.build_id,
              state: deploy.state,
              skipped: deploy.skipped,
              locked: deploy.locked,
              branch: deploy.branch,
              commit_ref: deploy.commit_ref,
              created_at: deploy.created_at,
              updated_at: deploy.updated_at,
              published_at: deploy.published_at,
              deploy_time: deploy.deploy_time,
              title: deploy.title,
              review_id: deploy.review_id,
              summary: deploy.summary || null,
              plugin_state: deploy.plugin_state,
            }));

          const commitMetadata = {};
          for (const deploy of production.slice(0, 3)) {
            if (!deploy.commit_ref) continue;
            const response = await fetch(`https://api.github.com/repos/${repository}/commits/${deploy.commit_ref}`, { headers: githubHeaders });
            const commit = await response.json();
            commitMetadata[deploy.commit_ref] = {
              status: response.status,
              author_login: commit.author?.login || null,
              committer_login: commit.committer?.login || null,
              git_author_name: commit.commit?.author?.name || null,
              git_author_email: commit.commit?.author?.email || null,
              git_committer_name: commit.commit?.committer?.name || null,
              git_committer_email: commit.commit?.committer?.email || null,
              verified: commit.commit?.verification?.verified ?? null,
              verification_reason: commit.commit?.verification?.reason || null,
            };
          }

          const newest = production[0];
          let newestDetail = null;
          let buildDetail = null;
          let buildLogStatus = null;
          let buildLogText = null;
          if (newest?.id) {
            newestDetail = await fetch(`https://api.netlify.com/api/v1/deploys/${newest.id}`).then((response) => response.json());
          }
          if (newest?.build_id) {
            const buildResponse = await fetch(`https://api.netlify.com/api/v1/builds/${newest.build_id}`);
            buildDetail = { status: buildResponse.status, body: await buildResponse.text() };
            const logResponse = await fetch(`https://api.netlify.com/api/v1/builds/${newest.build_id}/log`);
            buildLogStatus = logResponse.status;
            buildLogText = (await logResponse.text()).slice(0, 20_000);
          }

          console.log(JSON.stringify({
            site: {
              id: site.id,
              name: site.name,
              custom_domain: site.custom_domain,
              deploy_id: site.deploy_id,
              published_deploy: site.published_deploy ? {
                id: site.published_deploy.id,
                state: site.published_deploy.state,
                commit_ref: site.published_deploy.commit_ref,
                created_at: site.published_deploy.created_at,
                published_at: site.published_deploy.published_at,
                title: site.published_deploy.title,
              } : null,
            },
            marker: {
              status: markerResponse.status,
              content_type: markerResponse.headers.get('content-type'),
              text: markerText.slice(0, 300),
            },
            productionDeploys: production,
            commitMetadata,
            newestDetail,
            buildDetail,
            buildLogStatus,
            buildLogText,
          }, null, 2));
          NODE
      - name: Upload output
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: netlify-production-state
          path: netlify-production-state.txt
          retention-days: 1
      - name: Publish status
        if: always()
        env:
          GITHUB_TOKEN: ${{ github.token }}
          INSPECT_OUTCOME: ${{ steps.inspect.outcome }}
          TARGET_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          node <<'NODE'
          const response = await fetch(`https://api.github.com/repos/${process.env.GITHUB_REPOSITORY}/statuses/${process.env.GITHUB_SHA}`, {
            method: 'POST',
            headers: {
              accept: 'application/vnd.github+json',
              authorization: `Bearer ${process.env.GITHUB_TOKEN}`,
              'content-type': 'application/json',
              'x-github-api-version': '2022-11-28',
            },
            body: JSON.stringify({
              state: process.env.INSPECT_OUTCOME === 'success' ? 'success' : 'failure',
              context: 'accessrevamp/netlify-production-state',
              description: 'Netlify production state inspected',
              target_url: process.env.TARGET_URL,
            }),
          });
          if (!response.ok) throw new Error(`Status API returned ${response.status}`);
          NODE
