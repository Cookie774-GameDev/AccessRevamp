name: Export cinematic patch targets

on:
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  export:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Upload exact patch targets
        uses: actions/upload-artifact@v4
        with:
          name: cinematic-patch-targets
          path: |
            src/cinematic-scroll.js
            tests/cinematic-scroll.test.mjs
          if-no-files-found: error
          retention-days: 1
