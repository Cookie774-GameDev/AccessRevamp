name: Refresh patched PostCSS lock

on:
  push:
    branches:
      - fix/auth-recovery-email-branding-live
    paths:
      - package.json
      - .github/workflows/refresh-postcss-lock.yml

permissions:
  contents: write

concurrency:
  group: refresh-postcss-lock
  cancel-in-progress: true

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 8
    steps:
      - uses: actions/checkout@v4
        with:
          ref: fix/auth-recovery-email-branding-live
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - name: Regenerate the lockfile
        run: npm install --package-lock-only --ignore-scripts --no-audit --no-fund
      - name: Commit the patched lockfile
        shell: bash
        run: |
          if git diff --quiet -- package-lock.json; then
            echo "package-lock.json already matches package.json"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add package-lock.json
          git commit -m "Refresh lockfile for patched PostCSS"
          git push origin HEAD:fix/auth-recovery-email-branding-live
