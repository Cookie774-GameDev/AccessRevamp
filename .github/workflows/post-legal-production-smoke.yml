name: Post-legal production smoke

on:
  push:
    branches: [diag/post-legal-production-smoke]
    paths:
      - .github/workflows/post-legal-production-smoke.yml

permissions:
  contents: read
  statuses: write

jobs:
  probe:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Wait for public policy and support bundle
        id: legal
        continue-on-error: true
        shell: bash
        run: |
          set -o pipefail
          node <<'NODE' 2>&1 | tee post-legal-production-smoke.txt
          import assert from 'node:assert/strict';

          const target = 'https://accessrevamp.com';
          const markers = [
            'support.accessrevamp.com@gmail.com',
            '/customer-support',
            'Your privacy rights',
            'Project dashboard and delivery',
          ];
          const sleep = (ms) => new Promise((resolve) => setTimeout(resolve, ms));
          const deadline = Date.now() + 10 * 60 * 1000;
          let last = '';
          let bundle = '';

          while (Date.now() < deadline) {
            try {
              const response = await fetch(`${target}/support?production-smoke=${Date.now()}`, {
                headers: { 'cache-control': 'no-cache' },
                signal: AbortSignal.timeout(20_000),
              });
              assert.equal(response.status, 200);
              const html = await response.text();
              const sources = [...html.matchAll(/<script[^>]+src=["']([^"']+\.js)["']/gi)]
                .map((match) => new URL(match[1], target).toString());
              assert.ok(sources.length > 0, 'No JavaScript bundle was found.');
              const parts = await Promise.all(sources.map(async (source) => {
                const result = await fetch(source, { signal: AbortSignal.timeout(30_000) });
                if (!result.ok) throw new Error(`Bundle returned ${result.status}`);
                return result.text();
              }));
              bundle = parts.join('\n');
              const missing = markers.filter((marker) => !bundle.includes(marker));
              if (!missing.length) break;
              last = `Waiting for markers: ${missing.join(', ')}`;
            } catch (error) {
              last = String(error?.message || error);
            }
            await sleep(10_000);
          }

          for (const marker of markers) assert.ok(bundle.includes(marker), `${marker} was not published. ${last}`);
          for (const path of ['/privacy', '/policy', '/support', '/customer-support', '/terms', '/refunds', '/legal']) {
            const response = await fetch(`${target}${path}?route-smoke=${Date.now()}`, {
              redirect: 'follow',
              signal: AbortSignal.timeout(20_000),
            });
            assert.equal(response.status, 200, `${path} returned ${response.status}`);
          }
          console.log(JSON.stringify({ target, policyBundlePublished: true, routesReady: true, credentialsPrinted: false }, null, 2));
          NODE
      - name: Verify public signup sign-in and dashboard boundary
        id: auth
        continue-on-error: true
        env:
          NETLIFY_AUTH_TARGET: https://accessrevamp.com
          REQUIRE_SERVER_AUTH: 'true'
        shell: bash
        run: |
          set -o pipefail
          node scripts/quality/verify-netlify-auth-preview.mjs 2>&1 | tee -a post-legal-production-smoke.txt
      - name: Upload safe production evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: post-legal-production-smoke
          path: post-legal-production-smoke.txt
          retention-days: 1
      - name: Publish smoke status
        if: always()
        env:
          GITHUB_TOKEN: ${{ github.token }}
          LEGAL_OUTCOME: ${{ steps.legal.outcome }}
          AUTH_OUTCOME: ${{ steps.auth.outcome }}
          TARGET_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          node <<'NODE'
          const passed = process.env.LEGAL_OUTCOME === 'success' && process.env.AUTH_OUTCOME === 'success';
          const response = await fetch(`https://api.github.com/repos/${process.env.GITHUB_REPOSITORY}/statuses/${process.env.GITHUB_SHA}`, {
            method: 'POST',
            headers: {
              accept: 'application/vnd.github+json',
              authorization: `Bearer ${process.env.GITHUB_TOKEN}`,
              'content-type': 'application/json',
              'x-github-api-version': '2022-11-28',
            },
            body: JSON.stringify({
              state: passed ? 'success' : 'failure',
              context: 'accessrevamp/post-legal-production-smoke',
              description: passed ? 'Policy pages and authentication are live' : 'Production smoke failed',
              target_url: process.env.TARGET_URL,
            }),
          });
          if (!response.ok) throw new Error(`Status API returned ${response.status}`);
          if (!passed) process.exitCode = 1;
          NODE
