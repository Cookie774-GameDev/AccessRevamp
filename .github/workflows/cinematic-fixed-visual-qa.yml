name: Cinematic Fixed Visual QA

on:
  push:
    branches:
      - agent/fix-cinematic-navigation-runtime
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  browser-qa:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - name: Install locked dependencies
        run: npm ci --ignore-scripts --no-audit --no-fund
      - name: Run production checks and build
        run: npm run check
      - name: Install Chromium
        run: npx playwright install --with-deps chromium
      - name: Inspect production routes and export preview
        run: |
          mkdir -p cinematic-fixed-qa
          npx vite preview --host 127.0.0.1 --port 4173 > cinematic-fixed-qa/vite.log 2>&1 &
          SERVER_PID=$!
          trap 'kill $SERVER_PID || true' EXIT
          for attempt in {1..30}; do
            if curl -fsS http://127.0.0.1:4173/ >/dev/null; then break; fi
            sleep 1
          done
          node --input-type=module <<'NODE'
          import { chromium } from 'playwright';
          import { writeFile } from 'node:fs/promises';

          const cases = [
            { name: 'cinematic-desktop-start', path: '/cinematic-scroll', viewport: { width: 1440, height: 1050 }, progress: 0 },
            { name: 'cinematic-desktop-mid', path: '/cinematic-scroll', viewport: { width: 1440, height: 1050 }, progress: 0.56, captureStage: true },
            { name: 'cinematic-mobile-mid', path: '/cinematic-scroll', viewport: { width: 390, height: 844 }, mobile: true, progress: 0.56, captureStage: true },
            { name: 'pricing-mobile', path: '/pricing', viewport: { width: 390, height: 844 }, mobile: true, fullPage: true },
            { name: 'portfolio-desktop', path: '/portfolio', viewport: { width: 1440, height: 1050 }, fullPage: true },
            { name: 'refunds-mobile', path: '/refunds', viewport: { width: 390, height: 844 }, mobile: true, fullPage: true },
            { name: 'legal-desktop', path: '/legal', viewport: { width: 1440, height: 900 }, fullPage: true },
          ];

          const browser = await chromium.launch({ headless: true });
          const report = [];
          const failures = [];

          for (const item of cases) {
            const context = await browser.newContext({
              viewport: item.viewport,
              deviceScaleFactor: item.mobile ? 2 : 1,
              isMobile: Boolean(item.mobile),
              hasTouch: Boolean(item.mobile),
              reducedMotion: 'no-preference',
            });
            const page = await context.newPage();
            const consoleErrors = [];
            page.on('console', (message) => {
              if (message.type() === 'error') consoleErrors.push(message.text());
            });
            page.on('pageerror', (error) => consoleErrors.push(error.message));

            await page.goto(`http://127.0.0.1:4173${item.path}`, { waitUntil: 'networkidle' });
            await page.waitForTimeout(300);

            if (typeof item.progress === 'number' && item.progress > 0) {
              await page.evaluate((progress) => {
                const stage = document.querySelector('[data-cinematic-stage]');
                if (!stage) throw new Error('Cinematic stage was not rendered.');
                const stageTop = stage.getBoundingClientRect().top + scrollY;
                const target = stageTop + Math.max(0, stage.offsetHeight - innerHeight) * progress;
                scrollTo(0, target);
              }, item.progress);
              await page.waitForTimeout(260);
            }

            if (item.captureStage) {
              await page.locator('.cinematic-sticky').screenshot({
                path: `cinematic-fixed-qa/${item.name}.png`,
                animations: 'disabled',
              });
            } else {
              await page.screenshot({
                path: `cinematic-fixed-qa/${item.name}.png`,
                fullPage: Boolean(item.fullPage),
                animations: 'disabled',
              });
            }

            const metrics = await page.evaluate(() => {
              const stage = document.querySelector('[data-cinematic-stage]');
              const sticky = document.querySelector('.cinematic-sticky');
              const canvas = document.querySelector('[data-cinematic-canvas]');
              const beats = [...document.querySelectorAll('[data-beat]')]
                .map((beat) => ({
                  element: beat,
                  index: beat.dataset.beat,
                  opacity: Number.parseFloat(getComputedStyle(beat).opacity) || 0,
                }))
                .sort((a, b) => b.opacity - a.opacity);
              const visibleBeat = beats[0] || null;
              const beatRect = visibleBeat?.element.getBoundingClientRect() || null;
              const stickyRect = sticky?.getBoundingClientRect() || null;

              let canvasSignal = null;
              if (canvas) {
                const context = canvas.getContext('2d');
                const samplePoints = [
                  [0.18, 0.2], [0.5, 0.2], [0.82, 0.2],
                  [0.18, 0.5], [0.5, 0.5], [0.82, 0.5],
                  [0.18, 0.8], [0.5, 0.8], [0.82, 0.8],
                ];
                const luminance = samplePoints.map(([x, y]) => {
                  const pixel = context.getImageData(
                    Math.min(canvas.width - 1, Math.max(0, Math.floor(canvas.width * x))),
                    Math.min(canvas.height - 1, Math.max(0, Math.floor(canvas.height * y))),
                    1,
                    1,
                  ).data;
                  return Math.round(pixel[0] * 0.2126 + pixel[1] * 0.7152 + pixel[2] * 0.0722);
                });
                canvasSignal = {
                  min: Math.min(...luminance),
                  max: Math.max(...luminance),
                  range: Math.max(...luminance) - Math.min(...luminance),
                  samples: luminance,
                };
              }

              return {
                pathname: location.pathname,
                viewportWidth: innerWidth,
                documentWidth: document.documentElement.scrollWidth,
                documentHeight: document.documentElement.scrollHeight,
                scrollY,
                stageTop: stage ? stage.getBoundingClientRect().top : null,
                stickyRect: stickyRect ? { top: stickyRect.top, bottom: stickyRect.bottom, width: stickyRect.width, height: stickyRect.height } : null,
                pricingCards: document.querySelectorAll('.pricing-grid .price-card').length,
                cinematicCard: Boolean(document.querySelector('[data-cinematic-price-card]')),
                cinematicPortfolio: Boolean(document.querySelector('[data-cinematic-portfolio-card]')),
                stage: Boolean(stage),
                canvas: canvas ? { width: canvas.width, height: canvas.height } : null,
                canvasSignal,
                visibleBeat: visibleBeat ? { index: visibleBeat.index, opacity: visibleBeat.opacity } : null,
                visibleBeatRect: beatRect ? { top: beatRect.top, bottom: beatRect.bottom, width: beatRect.width, height: beatRect.height } : null,
                refundHeading: document.querySelector('.refund-policy') ? document.querySelector('h1')?.textContent || '' : '',
                legalHub: Boolean(document.querySelector('.legal-hub-grid')),
              };
            });

            const errors = [];
            if (metrics.documentWidth > metrics.viewportWidth + 1) errors.push(`horizontal overflow ${metrics.documentWidth}px > ${metrics.viewportWidth}px`);
            if (item.path === '/cinematic-scroll' && (!metrics.stage || !metrics.canvas?.width)) errors.push('cinematic stage or canvas missing');
            if (item.path === '/cinematic-scroll' && item.progress > 0 && (!metrics.stickyRect || Math.abs(metrics.stickyRect.top) > 1)) errors.push(`cinematic sticky frame not pinned: ${metrics.stickyRect?.top}px`);
            if (item.path === '/cinematic-scroll' && item.progress > 0 && (!metrics.visibleBeat || metrics.visibleBeat.opacity < 0.2)) errors.push('no readable cinematic story beat at captured progress');
            if (item.path === '/cinematic-scroll' && item.progress > 0 && metrics.visibleBeatRect && (metrics.visibleBeatRect.bottom < 0 || metrics.visibleBeatRect.top > metrics.stickyRect.height)) errors.push('active cinematic copy is outside the pinned frame');
            if (item.path === '/cinematic-scroll' && item.progress > 0 && (!metrics.canvasSignal || metrics.canvasSignal.max < 20 || metrics.canvasSignal.range < 8)) errors.push(`cinematic canvas lacks visible contrast: ${JSON.stringify(metrics.canvasSignal)}`);
            if (item.path === '/pricing' && (metrics.pricingCards !== 3 || !metrics.cinematicCard)) errors.push(`pricing cards=${metrics.pricingCards}, cinematic=${metrics.cinematicCard}`);
            if (item.path === '/portfolio' && !metrics.cinematicPortfolio) errors.push('cinematic portfolio concept missing');
            if (item.path === '/refunds' && !/Refund/i.test(metrics.refundHeading)) errors.push('refund heading missing');
            if (item.path === '/legal' && !metrics.legalHub) errors.push('legal hub missing');
            if (consoleErrors.length) errors.push(`console: ${consoleErrors.join(' | ')}`);

            report.push({ name: item.name, ...metrics, consoleErrors, errors });
            if (errors.length) failures.push(`${item.name}: ${errors.join('; ')}`);
            await context.close();
          }

          await browser.close();
          await writeFile('cinematic-fixed-qa/report.json', `${JSON.stringify({ report, failures }, null, 2)}\n`);
          if (failures.length) {
            console.error(failures.join('\n'));
            process.exit(1);
          }
          NODE
          cp -R dist cinematic-fixed-qa/site
      - name: Upload verified cinematic preview
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: accessrevamp-cinematic-fixed-preview
          path: cinematic-fixed-qa
          if-no-files-found: error
          retention-days: 7
          compression-level: 9
