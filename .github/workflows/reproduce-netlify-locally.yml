name: Reproduce Netlify build locally

on:
  push:
    branches:
      - fix/netlify-static-ffmpeg
    paths:
      - ".github/workflows/reproduce-netlify-locally.yml"
      - "netlify.toml"
      - "netlify/functions/**"
      - "package.json"
      - "package-lock.json"
      - "scripts/**"
      - "src/**"
  workflow_dispatch:

permissions:
  contents: read
  statuses: write

concurrency:
  group: accessrevamp-netlify-local-${{ github.ref }}
  cancel-in-progress: true

jobs:
  reproduce:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - name: Install locked dependencies
        run: npm ci --ignore-scripts --no-audit --no-fund
      - name: Run the complete Netlify build without a system FFmpeg
        id: local_build
        continue-on-error: true
        shell: bash
        env:
          FFMPEG_PATH: /definitely-unavailable/ffmpeg
          REQUIRE_FFMPEG_OPTIMIZATION: "false"
          MAX_SHOWCASE_VIDEO_BYTES: "9500000"
        run: |
          set -o pipefail
          npx --yes netlify-cli@latest build --offline --context deploy-preview --debug 2>&1 | tee netlify-local-build.log
      - name: Publish the reproduction result as a commit status
        if: always()
        env:
          GH_TOKEN: ${{ github.token }}
          REPOSITORY: ${{ github.repository }}
          COMMIT_SHA: ${{ github.sha }}
          OUTCOME: ${{ steps.local_build.outcome }}
        shell: bash
        run: |
          set -euo pipefail
          if [[ "${OUTCOME}" == "success" ]]; then
            state="success"
            description="Netlify CLI build passed without system FFmpeg"
          else
            state="failure"
            description="Netlify CLI build reproduced a failure"
          fi
          jq -n \
            --arg state "${state}" \
            --arg description "${description}" \
            '{state: $state, context: "local-netlify/reproduction", description: $description}' \
            > status.json
          curl --fail --silent --show-error \
            -X POST \
            -H "Authorization: Bearer ${GH_TOKEN}" \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            --data @status.json \
            "https://api.github.com/repos/${REPOSITORY}/statuses/${COMMIT_SHA}" \
            > /dev/null
      - name: Upload the local Netlify build log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: netlify-local-build-log
          path: netlify-local-build.log
          if-no-files-found: warn
          retention-days: 3
      - name: Fail when the local Netlify reproduction failed
        if: steps.local_build.outcome != 'success'
        run: exit 1
