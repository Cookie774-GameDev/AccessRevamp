name: AccessRevamp Auth Email

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "supabase/templates/accessrevamp-*.html"
      - "scripts/supabase/apply-auth-branding.mjs"
      - ".github/workflows/supabase-auth-branding.yml"

permissions:
  contents: read
  statuses: write

concurrency:
  group: accessrevamp-auth-email
  cancel-in-progress: false

jobs:
  apply-hosted-auth-branding:
    name: Configure production Auth and official email
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      SUPABASE_PROJECT_REF: vbkkimvedmklebghtkzs
      SUPABASE_AUTH_SITE_URL: https://accessrevamp.com
      SUPABASE_AUTH_REDIRECT_URLS: https://accessrevamp.com/login,https://accessrevamp.com/signup,https://accessrevamp.com/dashboard,https://www.accessrevamp.com/login,https://www.accessrevamp.com/signup,https://www.accessrevamp.com/dashboard
      SUPABASE_SMTP_ADMIN_EMAIL: ${{ secrets.SUPABASE_SMTP_ADMIN_EMAIL }}
      SUPABASE_SMTP_HOST: ${{ secrets.SUPABASE_SMTP_HOST }}
      SUPABASE_SMTP_PORT: ${{ secrets.SUPABASE_SMTP_PORT }}
      SUPABASE_SMTP_USER: ${{ secrets.SUPABASE_SMTP_USER }}
      SUPABASE_SMTP_PASS: ${{ secrets.SUPABASE_SMTP_PASS }}
      SUPABASE_SMTP_SENDER_NAME: AccessRevamp
      RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
      ACCESSREVAMP_FROM_EMAIL: ${{ secrets.ACCESSREVAMP_FROM_EMAIL }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Check protected Auth configuration
        id: configuration
        shell: bash
        run: |
          if [ -z "$SUPABASE_ACCESS_TOKEN" ]; then
            echo "credential_configured=false" >> "$GITHUB_OUTPUT"
            echo "::warning::SUPABASE_ACCESS_TOKEN is not configured. Hosted Auth settings were not changed."
          else
            echo "credential_configured=true" >> "$GITHUB_OUTPUT"
          fi

          standard_count=0
          for value in "$SUPABASE_SMTP_ADMIN_EMAIL" "$SUPABASE_SMTP_HOST" "$SUPABASE_SMTP_PORT" "$SUPABASE_SMTP_USER" "$SUPABASE_SMTP_PASS"; do
            if [ -n "$value" ]; then standard_count=$((standard_count + 1)); fi
          done
          resend_count=0
          for value in "$RESEND_API_KEY" "$ACCESSREVAMP_FROM_EMAIL"; do
            if [ -n "$value" ]; then resend_count=$((resend_count + 1)); fi
          done

          if [ "$standard_count" -ne 0 ] && [ "$standard_count" -ne 5 ]; then
            echo "smtp_configured=partial" >> "$GITHUB_OUTPUT"
            echo "smtp_mode=invalid" >> "$GITHUB_OUTPUT"
            echo "::error::Custom SMTP is partially configured. Add all five SUPABASE_SMTP_* secrets or remove all of them."
            exit 1
          fi
          if [ "$resend_count" -ne 0 ] && [ "$resend_count" -ne 2 ]; then
            echo "smtp_configured=partial" >> "$GITHUB_OUTPUT"
            echo "smtp_mode=invalid" >> "$GITHUB_OUTPUT"
            echo "::error::Resend is partially configured. Add both RESEND_API_KEY and ACCESSREVAMP_FROM_EMAIL or remove both."
            exit 1
          fi
          if [ "$standard_count" -eq 5 ] && [ "$resend_count" -eq 2 ]; then
            echo "smtp_configured=partial" >> "$GITHUB_OUTPUT"
            echo "smtp_mode=invalid" >> "$GITHUB_OUTPUT"
            echo "::error::Choose either the five SUPABASE_SMTP_* secrets or the two Resend secrets, not both."
            exit 1
          fi

          if [ "$standard_count" -eq 5 ]; then
            echo "smtp_configured=true" >> "$GITHUB_OUTPUT"
            echo "smtp_mode=custom" >> "$GITHUB_OUTPUT"
          elif [ "$resend_count" -eq 2 ]; then
            echo "smtp_configured=true" >> "$GITHUB_OUTPUT"
            echo "smtp_mode=resend" >> "$GITHUB_OUTPUT"
          else
            echo "smtp_configured=false" >> "$GITHUB_OUTPUT"
            echo "smtp_mode=none" >> "$GITHUB_OUTPUT"
          fi
      - name: Apply production Auth settings and available email branding
        id: apply
        if: steps.configuration.outputs.credential_configured == 'true' && steps.configuration.outputs.smtp_configured != 'partial'
        shell: bash
        run: |
          set -o pipefail
          node scripts/supabase/apply-auth-branding.mjs 2>&1 | tee supabase-auth-branding-apply.log
      - name: Verify hosted Auth configuration
        id: verify
        if: always() && steps.configuration.outputs.credential_configured == 'true' && steps.configuration.outputs.smtp_configured != 'partial' && steps.apply.outcome == 'success'
        shell: bash
        run: |
          set -o pipefail
          node scripts/supabase/apply-auth-branding.mjs --verify 2>&1 | tee supabase-auth-branding-verify.log
      - name: Upload safe Auth diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: accessrevamp-auth-email-diagnostics
          path: |
            supabase-auth-branding-apply.log
            supabase-auth-branding-verify.log
          if-no-files-found: ignore
          retention-days: 7
      - name: Publish safe commit status
        if: always()
        env:
          GITHUB_TOKEN: ${{ github.token }}
          CREDENTIAL_CONFIGURED: ${{ steps.configuration.outputs.credential_configured }}
          SMTP_CONFIGURED: ${{ steps.configuration.outputs.smtp_configured }}
          CONFIGURATION_OUTCOME: ${{ steps.configuration.outcome }}
          APPLY_OUTCOME: ${{ steps.apply.outcome }}
          VERIFY_OUTCOME: ${{ steps.verify.outcome }}
          STATUS_TARGET_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          node <<'NODE'
          const credentialConfigured = process.env.CREDENTIAL_CONFIGURED === 'true';
          const smtpConfigured = process.env.SMTP_CONFIGURED === 'true';
          const configurationValid = process.env.CONFIGURATION_OUTCOME === 'success';
          const applied = process.env.APPLY_OUTCOME === 'success';
          const verified = process.env.VERIFY_OUTCOME === 'success';
          const failed = !configurationValid || (credentialConfigured && (!applied || !verified));
          const state = failed ? 'failure' : (!credentialConfigured || !smtpConfigured ? 'pending' : 'success');
          const description = failed
            ? 'AccessRevamp Auth email configuration could not be verified'
            : (!credentialConfigured
              ? 'Waiting for the protected Auth management credential'
              : (!smtpConfigured
                ? 'Production redirects fixed; official sender still required'
                : 'Official AccessRevamp email templates applied and verified'));
          const response = await fetch(
            `https://api.github.com/repos/${process.env.GITHUB_REPOSITORY}/statuses/${process.env.GITHUB_SHA}`,
            {
              method: 'POST',
              headers: {
                accept: 'application/vnd.github+json',
                authorization: `Bearer ${process.env.GITHUB_TOKEN}`,
                'content-type': 'application/json',
                'x-github-api-version': '2022-11-28',
              },
              body: JSON.stringify({
                state,
                context: 'accessrevamp/auth-email',
                description,
                target_url: process.env.STATUS_TARGET_URL,
              }),
            },
          );
          if (!response.ok) throw new Error(`Commit status API returned ${response.status}.`);
          NODE
      - name: Write safe deployment summary
        if: always()
        shell: bash
        run: |
          {
            echo "## AccessRevamp Auth email"
            if [ "${{ steps.configuration.outputs.credential_configured }}" != "true" ]; then
              echo "No hosted setting was changed because the protected Auth management credential is missing."
            elif [ "${{ steps.apply.outcome }}" != "success" ] || [ "${{ steps.verify.outcome }}" != "success" ]; then
              echo "The hosted configuration attempt failed. A secret-safe diagnostic artifact named \`accessrevamp-auth-email-diagnostics\` was uploaded."
            elif [ "${{ steps.configuration.outputs.smtp_configured }}" = "true" ]; then
              echo "Official six-digit AccessRevamp templates, the verified sender, and the production Site URL were applied and verified."
              echo "Sender mode: ${{ steps.configuration.outputs.smtp_mode }}."
            else
              echo "The production Site URL, redirect allow list, confirmation requirement, and email lifetime were applied and verified."
              echo "Add either \`RESEND_API_KEY\` plus \`ACCESSREVAMP_FROM_EMAIL\`, or all five \`SUPABASE_SMTP_*\` secrets, to activate the official AccessRevamp sender and branded six-digit emails."
            fi
          } >> "$GITHUB_STEP_SUMMARY"
