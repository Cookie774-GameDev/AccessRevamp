name: Supabase Auth Branding

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "supabase/templates/accessrevamp-*.html"
      - "scripts/supabase/apply-auth-branding.mjs"
      - ".github/workflows/supabase-auth-branding.yml"

permissions:
  contents: read
  statuses: write

concurrency:
  group: accessrevamp-supabase-auth-branding
  cancel-in-progress: false

jobs:
  apply-hosted-auth-branding:
    name: Apply official email-code templates
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      SUPABASE_PROJECT_REF: vbkkimvedmklebghtkzs
      SUPABASE_AUTH_SITE_URL: https://accessrevamp.com
      SUPABASE_AUTH_REDIRECT_URLS: https://accessrevamp.com/login,https://accessrevamp.com/signup,https://www.accessrevamp.com/login,https://www.accessrevamp.com/signup
      SUPABASE_SMTP_ADMIN_EMAIL: ${{ secrets.SUPABASE_SMTP_ADMIN_EMAIL }}
      SUPABASE_SMTP_HOST: ${{ secrets.SUPABASE_SMTP_HOST }}
      SUPABASE_SMTP_PORT: ${{ secrets.SUPABASE_SMTP_PORT }}
      SUPABASE_SMTP_USER: ${{ secrets.SUPABASE_SMTP_USER }}
      SUPABASE_SMTP_PASS: ${{ secrets.SUPABASE_SMTP_PASS }}
      SUPABASE_SMTP_SENDER_NAME: AccessRevamp
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Check protected Management API credential
        id: credential
        shell: bash
        run: |
          if [ -z "$SUPABASE_ACCESS_TOKEN" ]; then
            echo "configured=false" >> "$GITHUB_OUTPUT"
            echo "::warning::SUPABASE_ACCESS_TOKEN is not configured. Hosted email templates were not changed."
          else
            echo "configured=true" >> "$GITHUB_OUTPUT"
          fi
      - name: Apply official AccessRevamp code emails and production URL
        id: apply
        if: steps.credential.outputs.configured == 'true'
        shell: bash
        run: |
          set -o pipefail
          node scripts/supabase/apply-auth-branding.mjs 2>&1 | tee supabase-auth-branding-apply.log
      - name: Verify hosted Auth configuration
        id: verify
        if: always() && steps.credential.outputs.configured == 'true' && steps.apply.outcome == 'success'
        shell: bash
        run: |
          set -o pipefail
          node scripts/supabase/apply-auth-branding.mjs --verify 2>&1 | tee supabase-auth-branding-verify.log
      - name: Upload safe Supabase Auth diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: supabase-auth-branding-diagnostics
          path: |
            supabase-auth-branding-apply.log
            supabase-auth-branding-verify.log
          if-no-files-found: ignore
          retention-days: 7
      - name: Publish safe commit status
        if: always()
        env:
          GITHUB_TOKEN: ${{ github.token }}
          CREDENTIAL_CONFIGURED: ${{ steps.credential.outputs.configured }}
          APPLY_OUTCOME: ${{ steps.apply.outcome }}
          VERIFY_OUTCOME: ${{ steps.verify.outcome }}
          STATUS_TARGET_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          node <<'NODE'
          const configured = process.env.CREDENTIAL_CONFIGURED === 'true';
          const applied = process.env.APPLY_OUTCOME === 'success';
          const verified = process.env.VERIFY_OUTCOME === 'success';
          const state = !configured ? 'pending' : (applied && verified ? 'success' : 'failure');
          const description = !configured
            ? 'Waiting for the protected SUPABASE_ACCESS_TOKEN secret'
            : (applied && verified
              ? 'Official six-digit email templates applied and verified'
              : 'Supabase Auth branding could not be applied or verified');
          const response = await fetch(
            `https://api.github.com/repos/${process.env.GITHUB_REPOSITORY}/statuses/${process.env.GITHUB_SHA}`,
            {
              method: 'POST',
              headers: {
                accept: 'application/vnd.github+json',
                authorization: `Bearer ${process.env.GITHUB_TOKEN}`,
                'content-type': 'application/json',
                'x-github-api-version': '2022-11-28',
              },
              body: JSON.stringify({
                state,
                context: 'supabase/auth-branding',
                description,
                target_url: process.env.STATUS_TARGET_URL,
              }),
            },
          );
          if (!response.ok) throw new Error(`Commit status API returned ${response.status}.`);
          NODE
      - name: Write safe deployment summary
        if: always()
        shell: bash
        run: |
          {
            echo "## Supabase Auth branding"
            if [ "${{ steps.credential.outputs.configured }}" = "true" ] && [ "${{ steps.apply.outcome }}" = "success" ] && [ "${{ steps.verify.outcome }}" = "success" ]; then
              echo "Official six-digit AccessRevamp templates and the production Site URL were applied and verified."
            elif [ "${{ steps.credential.outputs.configured }}" != "true" ]; then
              echo "No hosted setting was changed because the repository secret \`SUPABASE_ACCESS_TOKEN\` is missing."
            else
              echo "The hosted configuration attempt failed. A secret-safe diagnostic artifact named \`supabase-auth-branding-diagnostics\` was uploaded."
            fi
            if [ -n "$SUPABASE_SMTP_HOST" ] && [ -n "$SUPABASE_SMTP_ADMIN_EMAIL" ]; then
              echo "Custom SMTP values were supplied to the guarded configuration script."
            else
              echo "Custom SMTP was not supplied; the existing Supabase mail transport remains in use."
            fi
          } >> "$GITHUB_STEP_SUMMARY"
