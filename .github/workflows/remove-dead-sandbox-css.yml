name: Remove dead sandbox CSS

on:
  push:
    branches:
      - audit/launch-hardening-remove-sandbox-20260723
    paths:
      - .github/workflows/remove-dead-sandbox-css.yml

permissions:
  contents: write

jobs:
  remove:
    if: github.actor == 'Cookie774-GameDev'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.ref_name }}
          fetch-depth: 0

      - name: Remove dead selectors and expand regression coverage
        shell: bash
        run: |
          set -euo pipefail
          python - <<'PY'
          from pathlib import Path

          components = Path('src/styles/components.css')
          text = components.read_text()
          for line in (
              '.sandbox-badge { display: inline-flex; align-items: center; gap: .42rem; margin-top: .75rem; color: var(--ink-soft); font-size: .72rem; font-weight: 800; letter-spacing: .08em; text-transform: uppercase; }\n',
              '.sandbox-badge i { width: .55rem; height: .55rem; border-radius: 50%; background: var(--sun); box-shadow: 0 0 0 3px var(--sun-pale); }\n',
              '.site-footer .sandbox-badge { color: #cfd5e1; }\n',
          ):
              if line not in text:
                  raise SystemExit(f'Expected selector is missing: {line.strip()}')
              text = text.replace(line, '')
          components.write_text(text)

          pages = Path('src/styles/pages.css')
          text = pages.read_text()
          old = ':is(h3, p, li, .plan-price span, .sandbox-badge)'
          new = ':is(h3, p, li, .plan-price span)'
          if old not in text:
              raise SystemExit('Expected pricing selector is missing')
          pages.write_text(text.replace(old, new))

          contrast = Path('src/styles/order-wizard-dark-contrast.css')
          text = contrast.read_text()
          block = '.renaissance-home .order-payment .sandbox-badge {\n  color: #b7f5cf;\n}\n\n'
          if block not in text:
              raise SystemExit('Expected dark-theme selector is missing')
          contrast.write_text(text.replace(block, ''))

          test = Path('tests/launch-surface.test.mjs')
          text = test.read_text()
          old = "    collectTextFiles('src/data'),\n"
          new = "    collectTextFiles('src/data'),\n    collectTextFiles('src/styles'),\n"
          if old not in text:
              raise SystemExit('Expected launch-surface collection list is missing')
          test.write_text(text.replace(old, new))
          PY

          ! grep -RInE 'sandbox-badge|sandbox checkout|Stripe test mode|secure test checkout|test-mode notice' src
          node --test tests/launch-surface.test.mjs tests/launch-completion.test.mjs

      - name: Commit cleanup
        shell: bash
        run: |
          set -euo pipefail
          git rm .github/workflows/remove-dead-sandbox-css.yml
          git add src/styles tests/launch-surface.test.mjs
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git commit -m 'style(launch): remove dead sandbox selectors'
          git push origin HEAD:${{ github.ref_name }}
