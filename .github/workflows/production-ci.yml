name: Production CI

on:
  push:
    branches: [main]
    paths-ignore:
      - "docs/**"
      - "**/*.md"
  pull_request:

permissions:
  contents: read

concurrency:
  group: accessrevamp-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - name: Install FFmpeg for scrub-ready media
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends ffmpeg
      - name: Install locked dependencies
        run: npm ci --ignore-scripts --no-audit --no-fund
      - name: Static policy checks
        run: npm run lint
      - name: Contract and regression tests
        shell: bash
        run: |
          set -o pipefail
          npm test 2>&1 | tee test-output.txt
      - name: Verify connected Supabase Auth project
        run: npm run verify:supabase-public
      - name: Upload test output
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-output
          path: test-output.txt
          if-no-files-found: warn
          retention-days: 7
      - name: Production build
        env:
          REQUIRE_FFMPEG_OPTIMIZATION: "true"
          MAX_SHOWCASE_VIDEO_BYTES: "9500000"
        run: npm run build
      - name: Production dependency audit
        id: production_audit
        continue-on-error: true
        shell: bash
        run: |
          set -o pipefail
          npm audit --omit=dev --audit-level=high --json 2>&1 | tee audit-output.json
      - name: Upload dependency audit evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: dependency-audit-output
          path: audit-output.json
          if-no-files-found: warn
          retention-days: 7
      - name: Enforce production dependency audit
        if: steps.production_audit.outcome != 'success'
        run: exit 1

  netlify-auth-preview:
    name: Netlify authentication preview
    if: github.event_name == 'pull_request'
    needs: validate
    runs-on: ubuntu-latest
    timeout-minutes: 12
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Verify browser bundle and server authentication configuration
        env:
          DEPLOY_PREVIEW_URL: https://deploy-preview-${{ github.event.pull_request.number }}--accessrevamp.netlify.app
        run: npm run verify:netlify-auth-preview