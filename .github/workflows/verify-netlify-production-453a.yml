name: Verify latest Netlify production

on:
  push:
    branches:
      - verify/netlify-production-453a
  workflow_dispatch:

permissions:
  contents: read
  statuses: write

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 12
    env:
      EXPECTED_COMMIT: 453a386164ff19aefc523309dccca577a8414be4
      PRODUCTION_URL: https://accessrevamp.netlify.app
      SITE_ID: 1e31bb1c-2a13-4b27-83b4-cf3660d101ea
    steps:
      - name: Wait for the exact production deploy and smoke-test the site
        id: verify
        shell: bash
        run: |
          set -euo pipefail
          ready=false
          for attempt in $(seq 1 90); do
            root_code="$(curl --silent --show-error --location --output root.html --write-out '%{http_code}' "${PRODUCTION_URL}/" || true)"
            health_code="$(curl --silent --show-error --location --output health.json --write-out '%{http_code}' "${PRODUCTION_URL}/api/health" || true)"
            manifest_code="$(curl --silent --show-error --location --output manifest.json --write-out '%{http_code}' "${PRODUCTION_URL}/media/showcases/source-optimization.json" || true)"
            deploys_code="$(curl --silent --show-error --location --output deploys.json --write-out '%{http_code}' "https://api.netlify.com/api/v1/sites/${SITE_ID}/deploys?per_page=20" || true)"

            site_ok=false
            deploy_ok=false
            if [[ "${root_code}" == "200" && "${health_code}" == "200" && "${manifest_code}" == "200" ]] \
              && grep -q 'AccessRevamp' root.html \
              && jq -e '.ok == true and .service == "accessrevamp"' health.json >/dev/null \
              && jq -e '
                .status == "optimized"
                and .encoderVersion == "accessrevamp-scrub-v5"
                and (.files | length) == 6
                and all(.files[]; .status == "optimized" and .optimizedBytes <= 9500000)
              ' manifest.json >/dev/null; then
              site_ok=true
            fi

            if [[ "${deploys_code}" == "200" ]] && jq -e --arg commit "${EXPECTED_COMMIT}" '
              any(.[]; .context == "production" and .state == "ready" and .commit_ref == $commit)
            ' deploys.json >/dev/null; then
              deploy_ok=true
            fi

            if [[ "${site_ok}" == "true" && "${deploy_ok}" == "true" ]]; then
              ready=true
              break
            fi
            sleep 6
          done

          if [[ "${ready}" != "true" ]]; then
            echo "The exact merged commit did not become a ready, healthy Netlify production deployment in time."
            exit 1
          fi
          echo "Netlify production serves the exact merged commit and passed the public smoke checks."

      - name: Publish production verification status
        if: always()
        env:
          GH_TOKEN: ${{ github.token }}
          REPOSITORY: ${{ github.repository }}
          OUTCOME: ${{ steps.verify.outcome }}
        shell: bash
        run: |
          set -euo pipefail
          if [[ "${OUTCOME}" == "success" ]]; then
            state=success
            description="Exact Netlify production commit verified"
          else
            state=failure
            description="Netlify production verification failed"
          fi
          jq -n \
            --arg state "${state}" \
            --arg description "${description}" \
            --arg target_url "${PRODUCTION_URL}" \
            '{state: $state, context: "netlify-production/verification", description: $description, target_url: $target_url}' \
            > status.json
          curl --fail --silent --show-error \
            -X POST \
            -H "Authorization: Bearer ${GH_TOKEN}" \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            --data @status.json \
            "https://api.github.com/repos/${REPOSITORY}/statuses/${EXPECTED_COMMIT}" \
            > /dev/null
