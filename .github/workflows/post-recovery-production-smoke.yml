name: Post-recovery production smoke

on:
  push:
    branches: [diag/post-recovery-production-smoke]
    paths:
      - .github/workflows/post-recovery-production-smoke.yml
      - .github/diagnostics/post-recovery-trigger.txt

permissions:
  contents: read
  statuses: write

jobs:
  probe:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Publish pending smoke status
        env:
          GITHUB_TOKEN: ${{ github.token }}
          TARGET_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          node <<'NODE'
          const response = await fetch(`https://api.github.com/repos/${process.env.GITHUB_REPOSITORY}/statuses/${process.env.GITHUB_SHA}`, {
            method: 'POST',
            headers: {
              accept: 'application/vnd.github+json',
              authorization: `Bearer ${process.env.GITHUB_TOKEN}`,
              'content-type': 'application/json',
              'x-github-api-version': '2022-11-28',
            },
            body: JSON.stringify({
              state: 'pending',
              context: 'accessrevamp/post-recovery-production-smoke',
              description: 'Waiting for the production recovery deployment',
              target_url: process.env.TARGET_URL,
            }),
          });
          if (!response.ok) throw new Error(`Status API returned ${response.status}`);
          NODE
      - name: Wait for production recovery bundle and test public boundaries
        id: smoke
        continue-on-error: true
        shell: bash
        run: |
          set -o pipefail
          node <<'NODE' 2>&1 | tee post-recovery-production-smoke.txt
          import assert from 'node:assert/strict';
          import { randomUUID } from 'node:crypto';

          const target = 'https://accessrevamp.com';
          const sleep = (ms) => new Promise((resolve) => setTimeout(resolve, ms));
          const deadline = Date.now() + 10 * 60 * 1000;
          let bundle = '';
          let lastError = '';

          async function readWithRetry(url, options = {}) {
            let error;
            for (let attempt = 1; attempt <= 4; attempt += 1) {
              try {
                const response = await fetch(url, {
                  ...options,
                  signal: AbortSignal.timeout(30_000),
                });
                if (response.status < 500 || attempt === 4) return response;
                error = new Error(`${url} returned ${response.status}`);
              } catch (nextError) {
                error = nextError;
              }
              await sleep(attempt * 1_500);
            }
            throw error;
          }

          while (Date.now() < deadline) {
            try {
              const response = await readWithRetry(`${target}/forgot-password?production-smoke=${Date.now()}`, {
                headers: { 'cache-control': 'no-cache' },
              });
              assert.equal(response.status, 200);
              const html = await response.text();
              const sources = [...html.matchAll(/<script[^>]+src=["']([^"']+\.js)["']/gi)]
                .map((match) => new URL(match[1], target).toString());
              assert.ok(sources.length > 0, 'No JavaScript bundle was found.');
              const parts = await Promise.all(sources.map(async (source) => {
                const result = await readWithRetry(source);
                if (!result.ok) throw new Error(`Bundle returned ${result.status}`);
                return result.text();
              }));
              bundle = parts.join('\n');
              const required = [
                'Recover your account securely.',
                'accessrevamp.auth.recovery.v1',
                'resetPasswordForEmail',
                '/recover-account',
                'Forgot your password?',
                'Secure one-time checkout',
              ];
              const missing = required.filter((marker) => !bundle.includes(marker));
              if (missing.length) throw new Error(`Waiting for markers: ${missing.join(', ')}`);
              assert.doesNotMatch(bundle, /Sandbox checkout|Test-mode notice|Stripe test mode is active/i);

              const logo = await readWithRetry(`${target}/accessrevamp-email-logo.svg?production-smoke=${Date.now()}`);
              assert.equal(logo.status, 200);
              assert.match(await logo.text(), /<svg[\s\S]*#050608[\s\S]*#fff/i);
              break;
            } catch (error) {
              lastError = String(error?.message || error);
            }
            await sleep(10_000);
          }

          assert.match(bundle, /Recover your account securely\./, `Recovery bundle was not published. ${lastError}`);

          for (const path of ['/signup', '/login', '/forgot-password', '/recover-account', '/account/projects']) {
            const response = await readWithRetry(`${target}${path}?route-smoke=${Date.now()}`, { redirect: 'follow' });
            assert.equal(response.status, 200, `${path} returned ${response.status}`);
          }

          const accountResponse = await readWithRetry(`${target}/api/account-projects`, {
            headers: { origin: target },
          });
          assert.equal(accountResponse.status, 401);
          const accountBody = await accountResponse.json().catch(() => ({}));
          assert.match(String(accountBody.error || ''), /authentication required/i);

          const loginResponse = await readWithRetry(`${target}/api/auth-login-start`, {
            method: 'POST',
            headers: { origin: target, 'content-type': 'application/json' },
            body: JSON.stringify({
              email: `recovery-smoke-${randomUUID()}@example.invalid`,
              password: 'DeliberatelyInvalid!234',
            }),
          });
          assert.ok([401, 429].includes(loginResponse.status), `Login boundary returned ${loginResponse.status}`);

          console.log(JSON.stringify({
            target,
            recoveryBundlePublished: true,
            recoveryRoutesReady: true,
            emailLogoReady: true,
            customerFacingSandboxLabelsAbsent: true,
            signedOutDashboardProtected: true,
            signInBoundaryReady: true,
            credentialsPrinted: false,
          }, null, 2));
          NODE
      - name: Upload safe production evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: post-recovery-production-smoke
          path: post-recovery-production-smoke.txt
          retention-days: 1
      - name: Publish smoke status
        if: always()
        env:
          GITHUB_TOKEN: ${{ github.token }}
          SMOKE_OUTCOME: ${{ steps.smoke.outcome }}
          TARGET_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          node <<'NODE'
          const passed = process.env.SMOKE_OUTCOME === 'success';
          const response = await fetch(`https://api.github.com/repos/${process.env.GITHUB_REPOSITORY}/statuses/${process.env.GITHUB_SHA}`, {
            method: 'POST',
            headers: {
              accept: 'application/vnd.github+json',
              authorization: `Bearer ${process.env.GITHUB_TOKEN}`,
              'content-type': 'application/json',
              'x-github-api-version': '2022-11-28',
            },
            body: JSON.stringify({
              state: passed ? 'success' : 'failure',
              context: 'accessrevamp/post-recovery-production-smoke',
              description: passed ? 'Recovery, authentication, and production UI are live' : 'Post-recovery production smoke failed',
              target_url: process.env.TARGET_URL,
            }),
          });
          if (!response.ok) throw new Error(`Status API returned ${response.status}`);
          if (!passed) process.exitCode = 1;
          NODE
