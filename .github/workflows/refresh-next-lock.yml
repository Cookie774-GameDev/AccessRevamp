name: Refresh patched Next.js lockfile

on:
  push:
    branches:
      - fix/supabase-auth-branding-diagnostics
    paths:
      - .github/workflows/refresh-next-lock.yml

permissions:
  contents: write

jobs:
  refresh-lockfile:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          ref: fix/supabase-auth-branding-diagnostics
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - name: Generate the patched lockfile
        run: npm install --package-lock-only --ignore-scripts --no-audit --no-fund --save-exact next@16.2.11
      - name: Commit only dependency metadata
        shell: bash
        run: |
          if git diff --quiet -- package.json package-lock.json; then
            echo "The lockfile is already current."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add package.json package-lock.json
          git commit -m "Update Next.js to patched 16.2.11"
          git push origin HEAD:fix/supabase-auth-branding-diagnostics
