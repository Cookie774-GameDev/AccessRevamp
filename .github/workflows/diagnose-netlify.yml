name: Diagnose Netlify deploy

on:
  push:
    branches:
      - fix/netlify-static-ffmpeg
  workflow_dispatch:

permissions:
  contents: write
  statuses: read

concurrency:
  group: accessrevamp-netlify-diagnostic-${{ github.ref }}
  cancel-in-progress: true

jobs:
  diagnose:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 12
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.ref_name }}
          fetch-depth: 0
      - name: Wait for the Netlify commit status
        id: netlify
        env:
          GH_TOKEN: ${{ github.token }}
          REPOSITORY: ${{ github.repository }}
          COMMIT_SHA: ${{ github.sha }}
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p artifacts/netlify-diagnostic docs/evidence
          target=""
          state="pending"
          for attempt in $(seq 1 90); do
            payload="$(curl --fail --silent --show-error \
              -H "Authorization: Bearer ${GH_TOKEN}" \
              -H "Accept: application/vnd.github+json" \
              -H "X-GitHub-Api-Version: 2022-11-28" \
              "https://api.github.com/repos/${REPOSITORY}/commits/${COMMIT_SHA}/status")"
            state="$(jq -r '.statuses[]? | select(.context == "netlify/accessrevamp/deploy-preview") | .state' <<<"${payload}" | head -n1)"
            target="$(jq -r '.statuses[]? | select(.context == "netlify/accessrevamp/deploy-preview") | .target_url' <<<"${payload}" | head -n1)"
            if [[ "${state}" == "success" || "${state}" == "failure" || "${state}" == "error" ]]; then
              break
            fi
            sleep 6
          done
          printf '%s\n' "${target}" > artifacts/netlify-diagnostic/target-url.txt
          printf '%s\n' "${state}" > artifacts/netlify-diagnostic/status.txt
          echo "state=${state}" >> "${GITHUB_OUTPUT}"
          echo "target=${target}" >> "${GITHUB_OUTPUT}"
          if [[ -z "${target}" ]]; then
            echo "Netlify did not publish a status target within the bounded wait."
            exit 0
          fi
          deploy_id="${target##*/}"
          echo "deploy_id=${deploy_id}" >> "${GITHUB_OUTPUT}"

      - name: Read public deploy metadata and build log when available
        if: steps.netlify.outputs.deploy_id != ''
        env:
          DEPLOY_ID: ${{ steps.netlify.outputs.deploy_id }}
        shell: bash
        run: |
          set -euo pipefail
          output="artifacts/netlify-diagnostic/deploy.json"
          code="$(curl --silent --show-error --location \
            --output "${output}" \
            --write-out '%{http_code}' \
            "https://api.netlify.com/api/v1/deploys/${DEPLOY_ID}")"
          printf '%s\n' "${code}" > artifacts/netlify-diagnostic/http-status.txt
          if [[ "${code}" != "200" ]]; then
            echo "Netlify deploy metadata returned HTTP ${code}."
            exit 0
          fi

          jq '{id,site_id,build_id,state,error_message,summary,required,required_functions,available_functions,deploy_time,created_at,updated_at,commit_ref,branch,review_id,context,deploy_ssl_url,deploy_url,url,framework,frameworks}' "${output}" \
            | tee artifacts/netlify-diagnostic/deploy-summary.json

          build_id="$(jq -r '.build_id // empty' "${output}")"
          if [[ -z "${build_id}" ]]; then
            printf 'unavailable\n' > artifacts/netlify-diagnostic/build-log-http-status.txt
            exit 0
          fi

          log_code="$(curl --silent --show-error --location \
            --output artifacts/netlify-diagnostic/build-log.raw \
            --write-out '%{http_code}' \
            "https://api.netlify.com/api/v1/builds/${build_id}/log")"
          printf '%s\n' "${log_code}" > artifacts/netlify-diagnostic/build-log-http-status.txt
          if [[ "${log_code}" == "200" ]]; then
            sed -E \
              -e 's/\x1B\[[0-9;]*[A-Za-z]//g' \
              -e 's#https?://[^[:space:]]+#[url]#g' \
              -e 's/[A-Za-z0-9_=-]{32,}/[redacted]/g' \
              artifacts/netlify-diagnostic/build-log.raw \
              | grep -Ei 'error|failed|failure|exit code|unsupported|limit|too large|size|ffmpeg|function|bundle|deploy' \
              | tail -n 80 \
              > artifacts/netlify-diagnostic/build-log-errors.txt || true
          fi
          rm -f artifacts/netlify-diagnostic/build-log.raw

      - name: Write sanitized diagnostic summary
        if: always()
        env:
          COMMIT_SHA: ${{ github.sha }}
          NETLIFY_STATE: ${{ steps.netlify.outputs.state }}
          NETLIFY_TARGET: ${{ steps.netlify.outputs.target }}
        shell: bash
        run: |
          set -euo pipefail
          http_status="$(cat artifacts/netlify-diagnostic/http-status.txt 2>/dev/null || printf 'unavailable')"
          log_status="$(cat artifacts/netlify-diagnostic/build-log-http-status.txt 2>/dev/null || printf 'unavailable')"
          deploy="$(cat artifacts/netlify-diagnostic/deploy-summary.json 2>/dev/null || printf 'null')"
          error_lines="$(jq -Rs 'split("\n") | map(select(length > 0))' artifacts/netlify-diagnostic/build-log-errors.txt 2>/dev/null || printf '[]')"
          jq -n \
            --arg commit "${COMMIT_SHA}" \
            --arg state "${NETLIFY_STATE:-unknown}" \
            --arg target "${NETLIFY_TARGET:-}" \
            --arg httpStatus "${http_status}" \
            --arg logStatus "${log_status}" \
            --argjson deploy "${deploy}" \
            --argjson errorLines "${error_lines}" \
            '{generated_at: (now | todate), commit: $commit, github_status: $state, target_url: $target, metadata_http_status: $httpStatus, build_log_http_status: $logStatus, deploy: $deploy, sanitized_error_lines: $errorLines}' \
            > docs/evidence/netlify-diagnostic-latest.json

      - name: Upload sanitized diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: netlify-diagnostic
          path: artifacts/netlify-diagnostic
          if-no-files-found: warn
          retention-days: 3

      - name: Commit the sanitized summary
        if: always()
        shell: bash
        run: |
          set -euo pipefail
          git add docs/evidence/netlify-diagnostic-latest.json
          if git diff --cached --quiet; then
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git commit -m "chore: record Netlify deploy diagnostic"
          git pull --rebase origin "${GITHUB_REF_NAME}"
          git push origin "HEAD:${GITHUB_REF_NAME}"
