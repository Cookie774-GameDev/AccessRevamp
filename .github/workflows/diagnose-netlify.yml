name: Diagnose Netlify deploy

on:
  push:
    branches:
      - fix/netlify-static-ffmpeg
  workflow_dispatch:

permissions:
  contents: write
  statuses: read

concurrency:
  group: accessrevamp-netlify-diagnostic-${{ github.ref }}
  cancel-in-progress: true

jobs:
  diagnose:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 12
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.ref_name }}
          fetch-depth: 0
      - name: Wait for the Netlify commit status
        id: netlify
        env:
          GH_TOKEN: ${{ github.token }}
          REPOSITORY: ${{ github.repository }}
          COMMIT_SHA: ${{ github.sha }}
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p artifacts/netlify-diagnostic docs/evidence
          target=""
          state="pending"
          for attempt in $(seq 1 90); do
            payload="$(curl --fail --silent --show-error \
              -H "Authorization: Bearer ${GH_TOKEN}" \
              -H "Accept: application/vnd.github+json" \
              -H "X-GitHub-Api-Version: 2022-11-28" \
              "https://api.github.com/repos/${REPOSITORY}/commits/${COMMIT_SHA}/status")"
            state="$(jq -r '.statuses[]? | select(.context == "netlify/accessrevamp/deploy-preview") | .state' <<<"${payload}" | head -n1)"
            target="$(jq -r '.statuses[]? | select(.context == "netlify/accessrevamp/deploy-preview") | .target_url' <<<"${payload}" | head -n1)"
            if [[ "${state}" == "success" || "${state}" == "failure" || "${state}" == "error" ]]; then
              break
            fi
            sleep 6
          done
          printf '%s\n' "${target}" > artifacts/netlify-diagnostic/target-url.txt
          printf '%s\n' "${state}" > artifacts/netlify-diagnostic/status.txt
          echo "state=${state}" >> "${GITHUB_OUTPUT}"
          echo "target=${target}" >> "${GITHUB_OUTPUT}"
          if [[ -z "${target}" ]]; then
            exit 0
          fi
          echo "deploy_id=${target##*/}" >> "${GITHUB_OUTPUT}"

      - name: Read public deploy and build metadata
        if: steps.netlify.outputs.deploy_id != ''
        env:
          DEPLOY_ID: ${{ steps.netlify.outputs.deploy_id }}
        shell: bash
        run: |
          set -euo pipefail
          deploy_code="$(curl --silent --show-error --location \
            --output artifacts/netlify-diagnostic/deploy.json \
            --write-out '%{http_code}' \
            "https://api.netlify.com/api/v1/deploys/${DEPLOY_ID}")"
          printf '%s\n' "${deploy_code}" > artifacts/netlify-diagnostic/deploy-http-status.txt
          if [[ "${deploy_code}" != "200" ]]; then
            exit 0
          fi

          jq '{id,site_id,build_id,state,error_message,summary,required,required_functions,available_functions,deploy_time,created_at,updated_at,commit_ref,branch,review_id,context,deploy_ssl_url,deploy_url,url,framework,frameworks,plugin_state}' \
            artifacts/netlify-diagnostic/deploy.json \
            > artifacts/netlify-diagnostic/deploy-summary.json

          build_id="$(jq -r '.build_id // empty' artifacts/netlify-diagnostic/deploy.json)"
          if [[ -z "${build_id}" ]]; then
            exit 0
          fi
          build_code="$(curl --silent --show-error --location \
            --output artifacts/netlify-diagnostic/build.json \
            --write-out '%{http_code}' \
            "https://api.netlify.com/api/v1/builds/${build_id}")"
          printf '%s\n' "${build_code}" > artifacts/netlify-diagnostic/build-http-status.txt
          if [[ "${build_code}" == "200" ]]; then
            jq '{id,deploy_id,sha,done,error,created_at,deploy_state,deploy_pending_review_reason,strict_contributor_verification_failure}' \
              artifacts/netlify-diagnostic/build.json \
              > artifacts/netlify-diagnostic/build-summary.json
          fi

      - name: Write sanitized diagnostic summary
        if: always()
        env:
          COMMIT_SHA: ${{ github.sha }}
          NETLIFY_STATE: ${{ steps.netlify.outputs.state }}
          NETLIFY_TARGET: ${{ steps.netlify.outputs.target }}
        shell: bash
        run: |
          set -euo pipefail
          node <<'NODE'
          const fs = require('node:fs');
          const read = (path, fallback = null) => {
            try { return JSON.parse(fs.readFileSync(path, 'utf8')); } catch { return fallback; }
          };
          const text = (path, fallback = 'unavailable') => {
            try { return fs.readFileSync(path, 'utf8').trim() || fallback; } catch { return fallback; }
          };
          const summary = {
            generated_at: new Date().toISOString(),
            commit: process.env.COMMIT_SHA,
            github_status: process.env.NETLIFY_STATE || 'unknown',
            target_url: process.env.NETLIFY_TARGET || '',
            deploy_http_status: text('artifacts/netlify-diagnostic/deploy-http-status.txt'),
            build_http_status: text('artifacts/netlify-diagnostic/build-http-status.txt'),
            deploy: read('artifacts/netlify-diagnostic/deploy-summary.json'),
            build: read('artifacts/netlify-diagnostic/build-summary.json'),
          };
          fs.writeFileSync('docs/evidence/netlify-diagnostic-latest.json.tmp', `${JSON.stringify(summary, null, 2)}\n`);
          fs.renameSync('docs/evidence/netlify-diagnostic-latest.json.tmp', 'docs/evidence/netlify-diagnostic-latest.json');
          NODE

      - name: Upload sanitized diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: netlify-diagnostic
          path: artifacts/netlify-diagnostic
          if-no-files-found: warn
          retention-days: 3

      - name: Commit the sanitized summary
        if: always()
        shell: bash
        run: |
          set -euo pipefail
          if [[ ! -s docs/evidence/netlify-diagnostic-latest.json ]]; then
            echo "Diagnostic summary was not produced."
            exit 1
          fi
          git add docs/evidence/netlify-diagnostic-latest.json
          if git diff --cached --quiet; then
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git commit -m "chore: record Netlify deploy diagnostic"
          git pull --rebase origin "${GITHUB_REF_NAME}"
          git push origin "HEAD:${GITHUB_REF_NAME}"
