name: Refresh pinned lockfile and validate branch

on:
  push:
    branches:
      - agent/finalize-production-platform
    paths:
      - package.json
      - package-lock.json
      - .github/workflows/refresh-lockfile.yml

permissions:
  contents: write
  pull-requests: write

jobs:
  refresh-and-validate:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/finalize-production-platform
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 22.12.0
          cache: npm

      - name: Regenerate lockfile from exact package manifest
        id: refresh
        continue-on-error: true
        run: |
          set -o pipefail
          npm install --package-lock-only --ignore-scripts --no-audit --no-fund 2>&1 | tee refresh.log

      - name: Install from regenerated lockfile
        id: install
        if: steps.refresh.outcome == 'success'
        continue-on-error: true
        run: |
          set -o pipefail
          npm ci --ignore-scripts --no-audit --no-fund 2>&1 | tee install.log

      - name: Run static checks, tests, and production build
        id: check
        if: steps.install.outcome == 'success'
        continue-on-error: true
        run: |
          set -o pipefail
          npm run check 2>&1 | tee check.log

      - name: Audit production dependencies
        id: audit
        if: steps.install.outcome == 'success'
        continue-on-error: true
        run: |
          set -o pipefail
          npm audit --omit=dev --audit-level=high 2>&1 | tee audit.log

      - name: Commit verified lockfile
        id: commit
        if: steps.refresh.outcome == 'success' && steps.install.outcome == 'success' && steps.check.outcome == 'success' && steps.audit.outcome == 'success'
        run: |
          if git diff --quiet -- package-lock.json; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add package-lock.json
          git commit -m "Refresh pinned dependency lockfile"
          git push origin HEAD:agent/finalize-production-platform
          echo "changed=true" >> "$GITHUB_OUTPUT"

      - name: Report validation on pull request
        if: always()
        env:
          GH_TOKEN: ${{ github.token }}
          REFRESH: ${{ steps.refresh.outcome }}
          INSTALL: ${{ steps.install.outcome }}
          CHECK: ${{ steps.check.outcome }}
          AUDIT: ${{ steps.audit.outcome }}
          LOCK_CHANGED: ${{ steps.commit.outputs.changed }}
        run: |
          cat > validation-comment.md <<EOF
          Automated branch validation for \`${GITHUB_SHA}\`:

          - lockfile refresh: **${REFRESH}**
          - clean install: **${INSTALL}**
          - static checks, tests, and build: **${CHECK}**
          - production dependency audit: **${AUDIT}**
          - lockfile committed: **${LOCK_CHANGED:-false}**

          This workflow uses no deployment or application secrets and sends no email.
          EOF

          if [ "$REFRESH" != success ] || [ "$INSTALL" != success ] || [ "$CHECK" != success ] || [ "$AUDIT" != success ]; then
            {
              echo
              echo '<details><summary>Failure output</summary>'
              echo
              echo '```text'
              for file in refresh.log install.log check.log audit.log; do
                if [ -f "$file" ]; then
                  echo "--- $file ---"
                  tail -n 80 "$file"
                fi
              done
              echo '```'
              echo '</details>'
            } >> validation-comment.md
          fi

          gh pr comment 10 --body-file validation-comment.md

      - name: Fail when any validation stage failed
        if: always()
        env:
          REFRESH: ${{ steps.refresh.outcome }}
          INSTALL: ${{ steps.install.outcome }}
          CHECK: ${{ steps.check.outcome }}
          AUDIT: ${{ steps.audit.outcome }}
        run: |
          test "$REFRESH" = success
          test "$INSTALL" = success
          test "$CHECK" = success
          test "$AUDIT" = success
