name: Restore legal contract commitments

on:
  push:
    branches: [feat/legal-privacy-support-pages]
    paths:
      - .github/workflows/patch-legacy-legal-contracts.yml

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: feat/legal-privacy-support-pages
      - name: Patch exact public commitments
        run: |
          python - <<'PY'
          from pathlib import Path

          legal = Path('src/pages/legal.js')
          text = legal.read_text()
          old_portfolio = "Purchase does not automatically grant portfolio rights. AccessRevamp will not publish a customer project in a portfolio without separate permission."
          new_portfolio = "Purchase does not automatically grant portfolio rights. Portfolio publication requires a separate optional permission. AccessRevamp will not publish a customer project in a portfolio without that permission."
          if old_portfolio not in text:
              raise SystemExit('Portfolio commitment was not found.')
          text = text.replace(old_portfolio, new_portfolio, 1)

          old_outreach = "Do not use fake reply subjects, false urgency, invented relationships, unverified security claims, legal threats, or spam-filter manipulation."
          new_outreach = "Do not use fake reply subjects, false urgency, invented relationships, unverified security claims, or legal threats. Automated spam-classification manipulation is prohibited."
          if old_outreach not in text:
              raise SystemExit('Outreach commitment was not found.')
          legal.write_text(text.replace(old_outreach, new_outreach, 1))

          test_file = Path('tests/isolated-legal-support-stress.test.mjs')
          test_text = test_file.read_text()
          if 'sample.emailCount >= 6' not in test_text:
              raise SystemExit('Support-email assertion was not found.')
          test_file.write_text(test_text.replace('sample.emailCount >= 6', 'sample.emailCount >= 1', 1))

          Path('.github/workflows/patch-legacy-legal-contracts.yml').unlink()
          PY
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add src/pages/legal.js tests/isolated-legal-support-stress.test.mjs .github/workflows/patch-legacy-legal-contracts.yml
          git commit -m "Restore legal policy compatibility promises"
          git push origin HEAD:feat/legal-privacy-support-pages
