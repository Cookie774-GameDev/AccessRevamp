name: One-time fix cinematic navigation

on:
  push:
    branches:
      - agent/fix-cinematic-navigation-runtime

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/fix-cinematic-navigation-runtime
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Patch invalid DOMStringMap assignment and add regression guard
        run: |
          node --input-type=module <<'NODE'
          import { readFile, writeFile } from 'node:fs/promises';

          const sourcePath = 'src/cinematic-scroll.js';
          const oldFunction = `function makeInternalLink(href, label, marker = 'cinematic-nav') {
  const link = document.createElement('a');
  link.href = href;
  link.textContent = label;
  link.dataset[marker] = '';
  return link;
}`;
          const newFunction = `function makeInternalLink(href, label) {
  const link = document.createElement('a');
  link.href = href;
  link.textContent = label;
  link.setAttribute('data-cinematic-nav', '');
  return link;
}`;
          let source = await readFile(sourcePath, 'utf8');
          if (source.includes(oldFunction)) {
            source = source.replace(oldFunction, newFunction);
            await writeFile(sourcePath, source);
          } else if (!source.includes("link.setAttribute('data-cinematic-nav', '');")) {
            throw new Error('Expected cinematic navigation function was not found.');
          }

          const testPath = 'tests/cinematic-scroll.test.mjs';
          const testAnchor = "  assert.match(index, /src\\/cinematic-scroll\\.js/);";
          const testAddition = `${testAnchor}\n  assert.match(experience, /setAttribute\\('data-cinematic-nav', ''\\)/);\n  assert.doesNotMatch(experience, /dataset\\[marker\\]/);`;
          let tests = await readFile(testPath, 'utf8');
          if (!tests.includes("assert.doesNotMatch(experience, /dataset\\[marker\\]/);")) {
            if (!tests.includes(testAnchor)) throw new Error('Cinematic test insertion anchor was not found.');
            tests = tests.replace(testAnchor, testAddition);
            await writeFile(testPath, tests);
          }
          NODE
      - name: Run targeted and full checks
        run: |
          npm ci --ignore-scripts --no-audit --no-fund
          node --test tests/cinematic-scroll.test.mjs
          npm run check
      - name: Commit patch
        run: |
          if git diff --quiet; then
            echo "Patch already applied."
            exit 0
          fi
          git config user.name "AccessRevamp CI"
          git config user.email "actions@users.noreply.github.com"
          git add src/cinematic-scroll.js tests/cinematic-scroll.test.mjs
          git commit -m "Fix cinematic navigation runtime initialization"
          git push origin HEAD:agent/fix-cinematic-navigation-runtime
