name: Patch cinematic runtime branch

on:
  pull_request_target:
    types: [opened, reopened, synchronize]
    branches:
      - main

permissions:
  contents: write

jobs:
  patch-branch:
    if: github.event.pull_request.head.repo.full_name == github.repository && github.event.pull_request.head.ref == 'agent/fix-cinematic-navigation-runtime'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/fix-cinematic-navigation-runtime
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Apply exact runtime and regression patch
        run: |
          node --input-type=module <<'NODE'
          import { readFile, writeFile } from 'node:fs/promises';

          const sourcePath = 'src/cinematic-scroll.js';
          const oldFunction = `function makeInternalLink(href, label, marker = 'cinematic-nav') {
  const link = document.createElement('a');
  link.href = href;
  link.textContent = label;
  link.dataset[marker] = '';
  return link;
}`;
          const newFunction = `function makeInternalLink(href, label) {
  const link = document.createElement('a');
  link.href = href;
  link.textContent = label;
  link.setAttribute('data-cinematic-nav', '');
  return link;
}`;

          let source = await readFile(sourcePath, 'utf8');
          if (source.includes(oldFunction)) {
            source = source.replace(oldFunction, newFunction);
            await writeFile(sourcePath, source);
          } else if (!source.includes("link.setAttribute('data-cinematic-nav', '');")) {
            throw new Error('The expected cinematic navigation function was not found.');
          }

          const testPath = 'tests/cinematic-scroll.test.mjs';
          const anchor = "  assert.match(index, /src\\/cinematic-scroll\\.js/);";
          const addition = `${anchor}\n  assert.match(experience, /setAttribute\\('data-cinematic-nav', ''\\)/);\n  assert.doesNotMatch(experience, /dataset\\[marker\\]/);`;
          let tests = await readFile(testPath, 'utf8');
          if (!tests.includes("assert.doesNotMatch(experience, /dataset\\[marker\\]/);")) {
            if (!tests.includes(anchor)) throw new Error('The cinematic test anchor was not found.');
            tests = tests.replace(anchor, addition);
            await writeFile(testPath, tests);
          }
          NODE
      - name: Commit to repair branch
        run: |
          if git diff --quiet; then
            echo "Patch already applied."
            exit 0
          fi
          git config user.name "AccessRevamp CI"
          git config user.email "actions@users.noreply.github.com"
          git add src/cinematic-scroll.js tests/cinematic-scroll.test.mjs
          git commit -m "Fix cinematic navigation runtime initialization"
          git push origin HEAD:agent/fix-cinematic-navigation-runtime
