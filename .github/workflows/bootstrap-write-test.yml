name: Bootstrap write permission test

on:
  push:
    branches:
      - agent/build-accessrevamp-platform
    paths:
      - .github/workflows/bootstrap-write-test.yml

permissions:
  contents: write

jobs:
  test-write:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/build-accessrevamp-platform
          fetch-depth: 0
      - name: Verify branch write access
        shell: bash
        run: |
          set -euo pipefail
          printf 'GitHub Actions branch writes are available.\n' > .bootstrap-write-ok
          rm -f .github/workflows/bootstrap-write-test.yml
          git config user.name 'AccessRevamp bootstrap'
          git config user.email 'actions@users.noreply.github.com'
          git add -A
          git commit -m 'Verify GitHub Actions branch write access'
          git push origin HEAD:agent/build-accessrevamp-platform
